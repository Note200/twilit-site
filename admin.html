<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>twilit · admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono&family=Noto+Serif+SC:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080b10;
    --surface: #0d1119;
    --twilight: #c9a96e;
    --twilight-dim: #7a6543;
    --twilight-pale: #e8d5b0;
    --text: #b8b4a8;
    --text-dim: #6b6760;
    --border: rgba(201,169,110,0.12);
    --green: #4a8c3f;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(201,169,110,0.03) 2px, rgba(201,169,110,0.03) 4px);
    pointer-events: none;
    z-index: 100;
  }

  /* ---------- LOGIN ---------- */
  #login-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    position: relative;
    z-index: 1;
    padding: 1rem;
  }

  .login-box {
    text-align: center;
    max-width: 320px;
    width: 100%;
  }
  .login-box h1 {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--twilight-dim);
    margin-bottom: 2rem;
  }
  .login-box input {
    width: 100%;
    padding: 0.8rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--twilight-pale);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    text-align: center;
    letter-spacing: 0.15em;
    outline: none;
    transition: border-color 0.3s;
  }
  .login-box input:focus { border-color: var(--twilight-dim); }
  .login-box .hint {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 0.6rem;
  }
  .login-box .error {
    font-size: 0.75rem;
    color: #c74b16;
    margin-top: 0.5rem;
    min-height: 1.2rem;
  }
  .login-box .lockout {
    font-size: 0.75rem;
    color: #c74b16;
    margin-top: 0.8rem;
    line-height: 1.8;
  }
  .login-box .lockout .countdown {
    font-family: 'Space Mono', monospace;
    color: var(--twilight-dim);
  }
  .login-box input:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* ---------- ADMIN PANEL ---------- */
  #admin-screen { display: none; position: relative; z-index: 1; }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem 1.2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--twilight-dim);
  }
  .topbar .btn-sm {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 0.3rem 0.8rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.1em;
  }
  .topbar .btn-sm:hover { color: var(--twilight); border-color: var(--twilight-dim); }

  /* Settings */
  #settings-panel {
    display: none;
    padding: 1.5rem 1.2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #settings-panel.open { display: block; }
  .settings-row {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    margin-bottom: 1rem;
  }
  .settings-row label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .settings-row input {
    padding: 0.6rem 0.8rem;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--twilight-pale);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    outline: none;
  }
  .settings-row input:focus { border-color: var(--twilight-dim); }
  .settings-row .status {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
  }
  .status-ok { color: var(--green); }
  .status-pending { color: var(--twilight-dim); }

  /* Chat area */
  .chat-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 52px);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.2rem;
  }

  .msg {
    margin-bottom: 1.2rem;
    max-width: 90%;
    animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user {
    margin-left: auto;
    text-align: right;
  }
  .msg.user .bubble {
    background: rgba(201,169,110,0.08);
    border: 1px solid var(--border);
    padding: 0.7rem 1rem;
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--twilight-pale);
    display: inline-block;
    text-align: left;
    max-width: 100%;
    word-break: break-word;
  }
  .msg.assistant .bubble {
    padding: 0.7rem 0;
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text);
  }
  .msg.assistant .bubble pre {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.8rem;
    overflow-x: auto;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    line-height: 1.5;
    margin: 0.5rem 0;
    color: var(--twilight-pale);
  }
  .msg.assistant .bubble code {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    background: rgba(201,169,110,0.06);
    padding: 0.1rem 0.3rem;
  }
  .msg-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    margin-bottom: 0.3rem;
    color: var(--text-dim);
  }

  .typing-indicator {
    display: none;
    padding: 0.5rem 0;
  }
  .typing-indicator.active { display: block; }
  .typing-dot {
    display: inline-block;
    width: 4px;
    height: 4px;
    margin: 0 2px;
    background: var(--twilight-dim);
    border-radius: 50%;
    animation: typing 1.4s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; }
    30% { opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 0.8rem 1.2rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 0.5rem;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    padding: 0.6rem;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--twilight-pale);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.85rem;
    line-height: 1.5;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 40px;
  }
  .input-area textarea:focus { border-color: var(--twilight-dim); }
  .input-area .send-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 0.5rem 1rem;
    border: 1px solid var(--twilight-dim);
    background: transparent;
    color: var(--twilight-dim);
    cursor: pointer;
    letter-spacing: 0.1em;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .input-area .send-btn:hover { background: var(--twilight-dim); color: var(--bg); }
  .input-area .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 0.85rem;
    line-height: 2;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>twilit/admin</h1>
    <input type="password" id="passcode" placeholder="passcode" autocomplete="off" maxlength="32">
    <div class="hint">管理端入口 · 仅限站长</div>
    <div class="error" id="login-error"></div>
    <div class="lockout" id="login-lockout" style="display:none;"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="topbar">
    <span class="brand">twilit/admin</span>
    <div style="display:flex;gap:0.5rem;">
      <button class="btn-sm" onclick="toggleSettings()">SETTINGS</button>
      <button class="btn-sm" onclick="clearChat()">CLEAR</button>
      <button class="btn-sm" onclick="logout()">LOGOUT</button>
    </div>
  </div>

  <div id="settings-panel">
    <div class="settings-row">
      <label>MiMo API Endpoint</label>
      <input type="text" id="api-endpoint" placeholder="https://api.mimo.xiaomi.com/v1/chat/completions">
    </div>
    <div class="settings-row">
      <label>API Key</label>
      <input type="password" id="api-key" placeholder="sk-...">
    </div>
    <div class="settings-row">
      <label>Model Name</label>
      <input type="text" id="model-name" placeholder="mimo-max">
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span id="conn-status" class="status-pending" style="font-family:'Space Mono',monospace;font-size:0.65rem;">· not configured</span>
      <button class="btn-sm" onclick="saveSettings()">SAVE & TEST</button>
    </div>
  </div>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="empty-state">
        暮光管理终端已就绪<br>
        先点击 SETTINGS 配置 MiMo API<br>
        然后你可以让我帮你：<br>
        写新页面 / 改代码 / 生成诗歌 / 技术咨询
      </div>
    </div>
    <div class="typing-indicator" id="typing">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>
  </div>

  <div class="input-area">
    <textarea id="user-input" placeholder="说点什么..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>SEND</button>
  </div>
</div>

<script>
// ---- CONSTANTS ----
const PASSCODE_HASH = '7a8b3c9d1e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b'; // sha256 placeholder

// ---- STATE ----
let conversation = [];

// ---- HASH ----
async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ---- BRUTE FORCE PROTECTION ----
const MAX_ATTEMPTS = 5;
const BASE_LOCKOUT = 900; // 15 min in seconds

function getAttempts() {
  const data = JSON.parse(localStorage.getItem('twilit_attempts') || '{"count":0,"lockUntil":0}');
  // clean old format
  if (typeof data === 'number') data = { count: data, lockUntil: 0 };
  return data;
}
function saveAttempts(data) {
  localStorage.setItem('twilit_attempts', JSON.stringify(data));
}
function clearAttempts() {
  saveAttempts({ count: 0, lockUntil: 0 });
}

function checkLockout() {
  const data = getAttempts();
  const now = Math.floor(Date.now() / 1000);
  if (data.lockUntil > now) {
    return data.lockUntil - now; // seconds remaining
  }
  // lock expired
  if (data.lockUntil > 0) {
    data.lockUntil = 0;
    saveAttempts(data);
  }
  return 0;
}

function recordFailure() {
  let data = getAttempts();
  data.count++;
  if (data.count >= MAX_ATTEMPTS) {
    const extra = data.count - MAX_ATTEMPTS;
    const lockSec = BASE_LOCKOUT * Math.pow(2, extra); // 15m, 30m, 1h, 2h...
    data.lockUntil = Math.floor(Date.now() / 1000) + lockSec;
  }
  saveAttempts(data);
}

let lockoutTimer = null;
function showLockout(seconds) {
  const input = document.getElementById('passcode');
  const lockDiv = document.getElementById('login-lockout');
  input.disabled = true;
  lockDiv.style.display = 'block';

  function tick() {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    lockDiv.innerHTML = `锁定中 · 请 <span class="countdown">${mins}:${String(secs).padStart(2,'0')}</span> 后重试`;
    seconds--;
    if (seconds < 0) {
      clearInterval(lockoutTimer);
      lockoutTimer = null;
      lockDiv.style.display = 'none';
      input.disabled = false;
      input.value = '';
      document.getElementById('login-error').textContent = '';
    }
  }
  tick();
  if (lockoutTimer) clearInterval(lockoutTimer);
  lockoutTimer = setInterval(tick, 1000);
}

// ---- LOGIN ----
const passInput = document.getElementById('passcode');

// check lockout on page load
(function(){
  const remaining = checkLockout();
  if (remaining > 0) showLockout(remaining);
})();

passInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;

  const remaining = checkLockout();
  if (remaining > 0) {
    document.getElementById('login-error').textContent = `已锁定，请等待 ${Math.ceil(remaining/60)} 分钟`;
    return;
  }

  const hash = await sha256(passInput.value);
  if (hash === PASSCODE_HASH) {
    clearAttempts();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadSettings();
  } else {
    recordFailure();
    const data = getAttempts();
    const remaining2 = checkLockout();
    if (remaining2 > 0) {
      showLockout(remaining2);
    } else {
      const left = MAX_ATTEMPTS - data.count;
      document.getElementById('login-error').textContent =
        `密码错误。还剩 ${Math.max(0, left)} 次尝试`;
    }
    passInput.value = '';
  }
});

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('passcode').value = '';
  document.getElementById('login-error').textContent = '';
  const remaining = checkLockout();
  if (remaining > 0) showLockout(remaining);
}

// ---- SETTINGS ----
function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

function saveSettings() {
  const endpoint = document.getElementById('api-endpoint').value.trim();
  const key = document.getElementById('api-key').value.trim();
  const model = document.getElementById('model-name').value.trim();

  localStorage.setItem('twilit_admin_endpoint', endpoint);
  localStorage.setItem('twilit_admin_key', key);
  localStorage.setItem('twilit_admin_model', model || 'mimo-max');

  testConnection();
}

function loadSettings() {
  const ep = localStorage.getItem('twilit_admin_endpoint') || '';
  const key = localStorage.getItem('twilit_admin_key') || '';
  const model = localStorage.getItem('twilit_admin_model') || 'mimo-max';

  document.getElementById('api-endpoint').value = ep;
  document.getElementById('api-key').value = key;
  document.getElementById('model-name').value = model;

  if (ep && key) {
    document.getElementById('conn-status').textContent = '· ready';
    document.getElementById('conn-status').className = 'status-ok';
    document.getElementById('send-btn').disabled = false;
    document.getElementById('send-btn').textContent = 'SEND';
  } else {
    document.getElementById('conn-status').textContent = '· not configured';
    document.getElementById('conn-status').className = 'status-pending';
    document.getElementById('send-btn').disabled = true;
    document.getElementById('send-btn').textContent = 'SETUP API FIRST';
  }
}

async function testConnection() {
  const status = document.getElementById('conn-status');
  status.textContent = '· testing...';
  status.className = 'status-pending';

  const ep = localStorage.getItem('twilit_admin_endpoint');
  const key = localStorage.getItem('twilit_admin_key');
  const model = localStorage.getItem('twilit_admin_model');

  try {
    const res = await fetch(ep, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({ model, messages: [{ role: 'user', content: 'hi' }], max_tokens: 5 })
    });
    if (res.ok) {
      status.textContent = '· connected';
      status.className = 'status-ok';
      document.getElementById('send-btn').disabled = false;
      document.getElementById('send-btn').textContent = 'SEND';
      document.getElementById('settings-panel').classList.remove('open');
    } else {
      const txt = await res.text();
      status.textContent = `· error: ${res.status}`;
      status.className = 'status-pending';
      console.error(txt);
    }
  } catch(e) {
    status.textContent = `· ${e.message.slice(0,30)}`;
    status.className = 'status-pending';
  }
}

// ---- CHAT ----
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  const ep = localStorage.getItem('twilit_admin_endpoint');
  const key = localStorage.getItem('twilit_admin_key');
  const model = localStorage.getItem('twilit_admin_model');

  if (!ep || !key) {
    alert('请先在 SETTINGS 配置 API');
    return;
  }

  // clear empty state
  const empty = document.querySelector('.empty-state');
  if (empty) empty.remove();

  // add user msg
  appendMessage('user', text);
  conversation.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';

  // typing
  const typing = document.getElementById('typing');
  typing.classList.add('active');
  document.getElementById('send-btn').disabled = true;
  scrollDown();

  try {
    const res = await fetch(ep, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({ model, messages: conversation, temperature: 0.8, max_tokens: 2048 })
    });

    typing.classList.remove('active');

    if (!res.ok) {
      const err = await res.text();
      appendMessage('assistant', `[API Error ${res.status}] ${err.slice(0,200)}`);
    } else {
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || JSON.stringify(data);
      appendMessage('assistant', reply);
      conversation.push({ role: 'assistant', content: reply });
    }
  } catch(e) {
    typing.classList.remove('active');
    appendMessage('assistant', `[Network Error] ${e.message}`);
  } finally {
    document.getElementById('send-btn').disabled = false;
    document.getElementById('send-btn').textContent = 'SEND';
  }

  scrollDown();
}

function appendMessage(role, content) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const label = role === 'user' ? 'you' : 'mimo';
  const labelDiv = document.createElement('div');
  labelDiv.className = 'msg-label';
  labelDiv.textContent = label;
  div.appendChild(labelDiv);

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // render markdown-ish
  const html = content
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');

  bubble.innerHTML = html;
  div.appendChild(bubble);
  msgs.appendChild(div);

  // limit history
  while (msgs.children.length > 40) msgs.removeChild(msgs.firstChild);
}

function clearChat() {
  conversation = [];
  document.getElementById('messages').innerHTML = '<div class="empty-state">对话已清除</div>';
}

function scrollDown() {
  requestAnimationFrame(() => {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  });
}

// Auto-resize textarea
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
