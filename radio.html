<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>暮光短波电台 — twilit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Serif+SC:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0d12;
    --metal-dark: #1a1d22;
    --metal-mid: #2a2e36;
    --metal-light: #3a3e46;
    --display-bg: #0d1a0d;
    --display-glow: #5a8a4a;
    --display-dim: #2a3a2a;
    --knob-bronze: #8a6d3b;
    --knob-gold: #c9a96e;
    --needle: #d44a2a;
    --warn: #c74b16;
    --text: #9a9a8a;
    --text-dim: #5a5a4a;
  }

  body {
    background: #06080b;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    padding: 1rem;
  }

  /* Ambient background particles */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* CRT scanlines over everything */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(90,138,74,0.02) 2px, rgba(90,138,74,0.02) 4px);
    pointer-events: none;
    z-index: 200;
  }

  /* ---- RADIO UNIT ---- */
  .radio-unit {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    background: linear-gradient(180deg, var(--metal-dark) 0%, var(--metal-mid) 5%, var(--metal-dark) 80%, #111 100%);
    border: 2px solid var(--metal-light);
    border-radius: 12px;
    padding: 1.5rem 1.5rem 2rem;
    box-shadow:
      inset 0 2px 4px rgba(255,255,255,0.03),
      0 8px 32px rgba(0,0,0,0.6),
      0 0 0 1px rgba(0,0,0,0.5);
  }

  /* Brand plate */
  .brand-plate {
    text-align: center;
    margin-bottom: 1rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid rgba(90,138,74,0.15);
  }
  .brand-plate .brand {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: rgba(90,138,74,0.4);
  }
  .brand-plate .model {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    color: rgba(90,138,74,0.25);
    margin-top: 0.2rem;
  }

  /* ---- DISPLAY ---- */
  .display {
    background: var(--display-bg);
    border: 2px solid #111;
    border-radius: 6px;
    padding: 1rem;
    margin-bottom: 1.2rem;
    position: relative;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 12px rgba(90,138,74,0.08);
    min-height: 140px;
  }

  .display::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(90,138,74,0.03) 0%, transparent 70%);
    pointer-events: none;
    border-radius: 6px;
  }

  .freq-display {
    text-align: center;
    margin-bottom: 0.5rem;
    position: relative;
    z-index: 1;
  }
  .freq-main {
    font-size: 2.2rem;
    color: var(--display-glow);
    letter-spacing: 0.05em;
    text-shadow: 0 0 12px rgba(90,138,74,0.3);
    transition: color 0.5s;
  }
  .freq-unit {
    font-size: 0.7rem;
    color: var(--display-dim);
    letter-spacing: 0.15em;
    vertical-align: super;
  }

  .signal-meter {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 24px;
    margin: 0.5rem 0;
    position: relative;
    z-index: 1;
  }
  .signal-bar {
    flex: 1;
    background: var(--display-dim);
    transition: height 0.3s, background 0.3s;
    min-height: 2px;
  }
  .signal-bar.active { background: var(--display-glow); }
  .signal-bar.peak { background: var(--display-glow); box-shadow: 0 0 4px var(--display-glow); }

  .channel-label {
    text-align: center;
    font-size: 0.65rem;
    color: var(--display-dim);
    letter-spacing: 0.15em;
    position: relative;
    z-index: 1;
    margin-top: 0.3rem;
    min-height: 1.2rem;
  }

  /* ---- CHANNEL MESSAGE ---- */
  .msg-area {
    position: relative;
    z-index: 1;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.8rem;
    color: rgba(90,138,74,0.7);
    margin-top: 0.5rem;
    line-height: 1.7;
    min-height: 2.5rem;
    opacity: 0;
    transition: opacity 0.8s;
  }
  .msg-area.visible { opacity: 1; }

  /* ---- KNOB AREA ---- */
  .knob-section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1.5rem;
    margin: 1rem 0;
  }

  .knob-container {
    position: relative;
    width: 100px;
    height: 100px;
    cursor: grab;
  }
  .knob-container:active { cursor: grabbing; }
  .knob-container.grabbing { cursor: grabbing; }

  .knob {
    position: absolute;
    top: 0; left: 0;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #4a3a1a, #2a1a08);
    border: 3px solid var(--knob-bronze);
    box-shadow:
      inset 0 2px 4px rgba(255,255,255,0.05),
      0 4px 12px rgba(0,0,0,0.5);
    transition: box-shadow 0.2s;
  }
  .knob-container.grabbing .knob,
  .knob-container:active .knob {
    box-shadow:
      inset 0 2px 4px rgba(255,255,255,0.05),
      0 4px 12px rgba(0,0,0,0.5),
      0 0 20px rgba(201,169,110,0.2);
  }

  .knob-indicator {
    position: absolute;
    top: 8px;
    left: 50%;
    width: 3px;
    height: 14px;
    background: var(--knob-gold);
    border-radius: 2px;
    transform-origin: center 42px;
    transition: box-shadow 0.2s;
  }
  .knob-container.grabbing .knob-indicator,
  .knob-container:active .knob-indicator {
    box-shadow: 0 0 6px var(--knob-gold);
  }

  .knob-center {
    position: absolute;
    top: 32px; left: 32px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #6a4a20, #2a1a08);
    border: 2px solid var(--knob-bronze);
  }

  /* Frequency scale marks */
  .scale-marks {
    position: absolute;
    top: 0; left: 0;
    width: 100px; height: 100px;
    pointer-events: none;
  }
  .scale-mark {
    position: absolute;
    top: 50%; left: 50%;
    width: 1px;
    height: 6px;
    background: var(--display-dim);
    transform-origin: 0 0;
  }

  /* ---- BANDS ---- */
  .band-selector {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin: 0.5rem 0;
  }
  .band-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    padding: 0.4rem 0.6rem;
    border: 1px solid rgba(90,138,74,0.2);
    background: rgba(90,138,74,0.03);
    color: var(--display-dim);
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s;
  }
  .band-btn:hover { border-color: rgba(90,138,74,0.4); color: var(--display-glow); }
  .band-btn.active { border-color: var(--display-glow); color: var(--display-glow); background: rgba(90,138,74,0.08); }

  /* ---- CONTROLS ---- */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(90,138,74,0.1);
  }
  .vol-slider {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .vol-label {
    font-size: 0.55rem;
    color: var(--display-dim);
    letter-spacing: 0.15em;
  }
  .vol-slider input[type="range"] {
    -webkit-appearance: none;
    width: 80px;
    height: 4px;
    background: var(--display-dim);
    border-radius: 2px;
    outline: none;
  }
  .vol-slider input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--metal-light);
    border: 1px solid var(--knob-bronze);
    border-radius: 50%;
    cursor: pointer;
  }
  .power-led {
    width: 6px; height: 6px;
    background: var(--display-glow);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--display-glow);
    animation: led-pulse 2s infinite;
  }
  @keyframes led-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .back-link {
    text-align: center;
    margin-top: 1.2rem;
    font-size: 0.65rem;
  }
  .back-link a {
    color: rgba(90,138,74,0.25);
    text-decoration: none;
    letter-spacing: 0.1em;
  }
  .back-link a:hover { color: var(--display-glow); }

  /* ---- LOCKED CHANNEL MODAL ---- */
  .unlock-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(6,8,11,0.95);
    z-index: 300;
    justify-content: center;
    align-items: center;
    color: var(--display-glow);
    text-align: center;
    padding: 2rem;
  }
  .unlock-overlay.open { display: flex; }
  .unlock-msg {
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    line-height: 2;
    max-width: 300px;
  }
  .unlock-msg .freq {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    display: block;
    margin: 1rem 0;
    text-shadow: 0 0 16px var(--display-glow);
  }

  /* ================================================
     [ENHANCED] Dynamic Effects & Visual Polish
     ================================================ */

  /* -- Page Transition -- */
  html {
    animation: pageReveal 0.5s ease-out;
  }
  @keyframes pageReveal {
    from { opacity: 0; filter: brightness(1.6) blur(1px); }
    to   { opacity: 1; filter: brightness(1) blur(0); }
  }

  /* -- Mouse Follow Glow -- */
  #mouse-glow {
    position: fixed;
    pointer-events: none;
    z-index: 98;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(90,138,74,0.07) 0%, rgba(90,138,74,0.02) 40%, transparent 70%);
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.5s ease;
    will-change: left, top, opacity;
  }

  /* -- CRT Noise Overlay -- */
  #crt-noise {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 97;
    opacity: 0.03;
    animation: crtNoiseFlicker 6s infinite;
  }
  @keyframes crtNoiseFlicker {
    0%, 100% { opacity: 0.02; }
    3%  { opacity: 0.05; }
    6%  { opacity: 0.02; }
    50% { opacity: 0.035; }
    53% { opacity: 0.02; }
  }

  /* -- Click Ripple -- */
  .click-ripple {
    position: fixed;
    pointer-events: none;
    z-index: 151;
    border: 1px solid rgba(90,138,74,0.35);
    border-radius: 50%;
    animation: rippleExpand 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  @keyframes rippleExpand {
    from { width: 0; height: 0; opacity: 0.6; }
    to   { width: 130px; height: 130px; opacity: 0; margin-left: -65px; margin-top: -65px; }
  }

  /* -- Title / Heading Hover Pulse -- */
  h1:hover, h2:hover, .motto:hover, .call-sign:hover, .plaque h1:hover,
  .domain:hover, .brand:hover, .logo:hover {
    animation: titlePulse 0.9s ease-in-out;
  }
  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 6px #5a8a4a; }
    50%      { text-shadow: 0 0 22px #5a8a4a, 0 0 45px #5a8a4a; }
  }

  /* -- Card Lift + Border Glow on Hover -- */
  .project-card, .repo-card, .poem, .panel, .terminal, .log-entry {
    transition: transform 0.3s cubic-bezier(0.33, 1, 0.68, 1),
                box-shadow 0.3s cubic-bezier(0.33, 1, 0.68, 1),
                border-color 0.3s ease;
  }
  .project-card:hover, .repo-card:hover, .poem:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(90,138,74,0.14);
    border-color: rgba(90,138,74,0.4);
  }
  .panel:hover, .terminal:hover {
    box-shadow: 0 4px 20px rgba(90,138,74,0.08);
  }

  /* -- Unified Interactive Transition -- */
  a, button, .action-btn, .diag-btn, .decode-btn, .bai-btn, .band-btn,
  .send-btn, .btn-sm, .project-card, .repo-card, .tag, input, textarea {
    transition: color 0.25s ease, background 0.25s ease,
                border-color 0.25s ease, box-shadow 0.25s ease,
                transform 0.2s ease, opacity 0.25s ease;
  }

  /* -- Footer Breathing Light -- */
  .footer, .back-link, .status-bar {
    animation: footerBreathe 4.5s ease-in-out infinite;
  }
  @keyframes footerBreathe {
    0%, 100% { opacity: 0.6; }
    50%      { opacity: 1; }
  }

  /* -- Enhanced Scanline Animation -- */
  @keyframes scanlineJitter {
    0%, 100% { opacity: 1; transform: translateY(0); }
    1%  { opacity: 0.82; }
    2%  { opacity: 1; }
    50% { opacity: 0.94; }
    52% { opacity: 1; }
    97% { opacity: 0.88; }
    98% { opacity: 1; }
  }
  body::before {
    animation: scanlineJitter 8s infinite;
  }


  /* ================================================
     [NEW] 3D Card Tilt + Audio Button + Three Canvas
     ================================================ */

  /* -- Three.js Canvas Container -- */
  #three-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* -- 3D Card Tilt -- */
  .project-card, .repo-card, .poem, .panel, .crt-frame, .msg, .log-entry {
    transform-style: preserve-3d;
    perspective: 800px;
  }

  /* -- Audio Toggle Button -- */
  #audio-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 300;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(90,138,74,0.18);
    background: rgba(0,0,0,0.55);
    color: rgba(90,138,74,0.45);
    cursor: pointer;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  #audio-toggle:hover {
    border-color: rgba(90,138,74,0.5);
    color: rgba(90,138,74,0.8);
    box-shadow: 0 0 16px rgba(90,138,74,0.2);
  }
  #audio-toggle.playing {
    opacity: 0.22;
    border-color: rgba(90,138,74,0.3);
  }
  #audio-toggle.playing:hover {
    opacity: 0.65;
  }


  /* ================================================
     [NEW] Audio Activation Hint Bar
     ================================================ */
  #audio-hint {
    position: fixed;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 400;
    background: rgba(8,11,14,0.94);
    border: 1px solid rgba(90,138,74,0.22);
    border-top: none;
    padding: 0.45rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 0.55rem;
    font-family: 'Space Mono', 'Share Tech Mono', 'Source Code Pro', 'Courier New', monospace;
    font-size: 0.68rem;
    color: rgba(90,138,74,0.72);
    letter-spacing: 0.07em;
    text-shadow: 0 0 8px rgba(90,138,74,0.18);
    opacity: 1;
    transition: opacity 0.55s ease, transform 0.55s ease;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    border-radius: 0 0 1px 1px;
    white-space: nowrap;
  }
  .audio-hint-dot {
    display: inline-block;
    width: 4px; height: 4px;
    background: rgba(90,138,74,0.5);
    border-radius: 50%;
    flex-shrink: 0;
    animation: hintDotBlink 1.3s ease-in-out infinite;
  }
  @keyframes hintDotBlink {
    0%, 100% { opacity: 0.25; box-shadow: 0 0 2px rgba(90,138,74,0.3); }
    50%      { opacity: 1;    box-shadow: 0 0 8px rgba(90,138,74,0.5); }
  }

</style>

<div id="audio-hint">

<script>
(function(){
  var hint = document.getElementById('audio-hint');
  if (!hint) return;
  var gone = false;
  function dismiss() {
    if (gone) return; gone = true;
    hint.style.opacity = '0';
    hint.style.transform = 'translateX(-50%) translateY(-120%)';
    setTimeout(function(){ hint.remove(); }, 600);
  }
  setTimeout(dismiss, 3500);
  document.addEventListener('click', dismiss, {once: true});
  document.addEventListener('touchstart', dismiss, {once: true});
})();
</script>

<script>
// ---- AUDIO ENGINE ----
let audioCtx = null;
let currentOscillators = [];
let currentGain = null;
let masterGain = null;
let noiseNode = null;
let noiseGain = null;
let isAudioStarted = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.4;
  masterGain.connect(audioCtx.destination);

  // Noise generator
  const bufferSize = 2 * audioCtx.sampleRate;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  noiseNode = audioCtx.createBufferSource();
  noiseNode.buffer = noiseBuffer;
  noiseNode.loop = true;
  noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0.02;
  noiseNode.connect(noiseGain);
  noiseGain.connect(masterGain);
  noiseNode.start();

  isAudioStarted = true;
}

function stopAllSound() {
  currentOscillators.forEach(o => {
    try { o.stop(); } catch(e) {}
    try { o.disconnect(); } catch(e) {}
  });
  currentOscillators = [];
  if (currentGain) {
    try { currentGain.disconnect(); } catch(e) {}
    currentGain = null;
  }
}

function playTone(freqs, type = 'sine', gainVal = 0.15, detune = 0) {
  if (!isAudioStarted) initAudio();
  stopAllSound();
  currentGain = audioCtx.createGain();
  currentGain.gain.value = gainVal;
  currentGain.connect(masterGain);
  const freqsArr = Array.isArray(freqs) ? freqs : [freqs];
  freqsArr.forEach(f => {
    const osc = audioCtx.createOscillator();
    osc.type = type;
    osc.frequency.value = f;
    if (detune) osc.detune.value = detune;
    osc.connect(currentGain);
    osc.start();
    currentOscillators.push(osc);
  });
}

// ---- CHANNEL DEFINITIONS ----
const bands = [
  {
    id: 'sw',
    name: 'SW',
    channels: [
      { freq: 1420, unit: 'MHz', label: 'HYDROGEN LINE', type: 'space',
        msg: '1420.4 兆赫——宇宙最孤独的频率。<br>氢原子在自旋翻转时发出的唯一叹息。',

// Tracking visited channels for unlock
let visitedChannels = new Set(JSON.parse(localStorage.getItem('twilit_visited') || '[]'));

function markVisited(bandId, chIdx) {
  const key = `${bandId}_${chIdx}`;
  visitedChannels.add(key);
  localStorage.setItem('twilit_visited', JSON.stringify([...visitedChannels]));
}

function checkAllVisited() {
  const all = [];
  bands.forEach((b, bi) => {
    if (b.id === 'xx') return;
    b.channels.forEach((ch, ci) => {
      all.push(`${b.id}_${ci}`);
    });
  });
  return all.every(k => visitedChannels.has(k));
}

function buildScaleMarks() {
  const container = document.getElementById('scale-marks');
  container.innerHTML = '';
  for (let i = 0; i < 36; i++) {
    const deg = i * 10;
    const rad = (deg - 90) * Math.PI / 180;
    const len = i % 9 === 0 ? 10 : (i % 3 === 0 ? 7 : 4);
    const r1 = 46;
    const r2 = r1 - len;
    const mark = document.createElement('div');
    mark.className = 'scale-mark';
    mark.style.cssText = `
      transform: translate(${Math.cos(rad) * r1 - 0.5}px, ${Math.sin(rad) * r1 - 3}px)
                 rotate(${deg}deg);
      height: ${len}px;
      opacity: ${i % 9 === 0 ? 0.5 : 0.2};
    `;
    container.appendChild(mark);
  }
}

function buildBandButtons() {
  const container = document.getElementById('band-selector');
  container.innerHTML = '';
  bands.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'band-btn' + (i === currentBandIdx ? ' active' : '');
    btn.textContent = b.name;
    btn.addEventListener('click', () => switchBand(i));
    container.appendChild(btn);
  });
}

function setKnobAngle(deg) {

function tuneToChannel(bandIdx, chIdx) {
  currentBandIdx = bandIdx;
  currentChannelIdx = chIdx;
  const band = bands[bandIdx];
  const ch = band.channels[chIdx];

  if (ch.locked) {
    document.getElementById('freq-num').textContent = '----';
    document.getElementById('freq-band').textContent = '';
    document.getElementById('channel-name').textContent = ch.label;
    document.getElementById('channel-msg').innerHTML = '';
    document.getElementById('channel-msg').classList.remove('visible');
    updateSignalMeter(0);
    stopAllSound();
    if (noiseGain) noiseGain.gain.value = 0;
    return;
  }

  document.getElementById('freq-num').textContent = ch.freq;
  document.getElementById('freq-band').textContent = ch.unit;
  document.getElementById('channel-name').textContent = ch.label;

  const msgEl = document.getElementById('channel-msg');
  msgEl.innerHTML = ch.msg;
  msgEl.classList.remove('visible');
  requestAnimationFrame(() => { msgEl.classList.add('visible'); });

  markVisited(band.id, chIdx);

  const noiseLevel = 0.1 + Math.random() * 0.4;
  updateSignalMeter(noiseLevel);

  if (ch.sound && isAudioStarted) ch.sound(noiseLevel);

  // Update band buttons
  document.querySelectorAll('.band-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === bandIdx);
  });
}

function switchBand(idx) {
  currentBandIdx = idx;
  currentChannelIdx = 0;
  const band = bands[idx];
  const ch = band.channels[0];
  if (ch.locked) {
    // Check unlock condition
    if (checkAllVisited()) {
      unlockHidden();
    } else {
      showUnlockHint();
      currentBandIdx = 0;
      currentChannelIdx = 0;
      tuneToChannel(0, 0);
      setKnobAngle(0);
      return;
    }
  }
  tuneToChannel(idx, 0);
  setKnobAngle(0);
}

function updateSignalMeter(level) {
  const bars = document.getElementById('signal-meter').children;
  const activeCount = Math.floor(level * bars.length);
  for (let i = 0; i < bars.length; i++) {
    bars[i].classList.toggle('active', i < activeCount);
    bars[i].classList.toggle('peak', i === activeCount - 1 && activeCount > 0);
  }
}

// ---- KNOB DRAG ----
const knobContainer = document.getElementById('knob-container');
let isDragging = false;
let dragStartAngle = 0;
let dragStartKnobAngle = 0;

function getAngle(e) {
  const rect = knobContainer.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const px = e.touches ? e.touches[0].clientX : e.clientX;
  const py = e.touches ? e.touches[0].clientY : e.clientY;
  return Math.atan2(py - cy, px - cx) * 180 / Math.PI + 90;
}

knobContainer.addEventListener('mousedown', startDrag);
knobContainer.addEventListener('touchstart', startDrag, { passive: false });
window.addEventListener('mousemove', drag);
window.addEventListener('touchmove', drag, { passive: false });
window.addEventListener('mouseup', endDrag);
window.addEventListener('touchend', endDrag);

function startDrag(e) {
  if (!isAudioStarted) initAudio();
  e.preventDefault();
  isDragging = true;
  knobContainer.classList.add('grabbing');
  dragStartAngle = getAngle(e);
  dragStartKnobAngle = knobAngle;
}

function drag(e) {
  if (!isDragging) return;
  e.preventDefault();
  const currentAngle = getAngle(e);
  let delta = currentAngle - dragStartAngle;
  if (delta > 180) delta -= 360;
  if (delta < -180) delta += 360;

  let newAngle = dragStartKnobAngle + delta;
  // Map angle 0-360 to channel
  const band = bands[currentBandIdx];
  const totalChannels = band.channels.length;
  const segmentSize = 360 / totalChannels;
  // Clamp
  newAngle = ((newAngle % 360) + 360) % 360;

  const chIdx = Math.floor(newAngle / segmentSize);
  const clampedIdx = Math.min(chIdx, totalChannels - 1);

  if (clampedIdx !== currentChannelIdx) {
    const ch = band.channels[clampedIdx];
    if (ch.locked) {
      if (checkAllVisited()) {
        unlockHidden();
      } else {
        showUnlockHint();
        return;
      }
    }
    currentChannelIdx = clampedIdx;
    tuneToChannel(currentBandIdx, clampedIdx);
  }

  setKnobAngle(newAngle);
}

function endDrag() {
  isDragging = false;
  knobContainer.classList.remove('grabbing');
  // Snap to nearest channel
  const band = bands[currentBandIdx];
  const totalChannels = band.channels.length;
  const segmentSize = 360 / totalChannels;
  const snapIdx = Math.round(knobAngle / segmentSize) % totalChannels;
  const snapAngle = snapIdx * segmentSize;
  setKnobAngle(snapAngle);
  if (snapIdx !== currentChannelIdx) {
    currentChannelIdx = snapIdx;
    tuneToChannel(currentBandIdx, snapIdx);
  }
}

// ---- BACKGROUND PARTICLES ----
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createParticles() {
  particles = [];
  const count = Math.floor(bgCanvas.width * bgCanvas.height / 12000);
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * bgCanvas.width,
      y: Math.random() * bgCanvas.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: Math.random() * 1.5 + 0.5,
      alpha: Math.random() * 0.4 + 0.1,
      fadeSpeed: (Math.random() - 0.5) * 0.005
    });
  }
}
createParticles();
window.addEventListener('resize', createParticles);

function animateParticles() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  const noiseLevel = isDragging ? 0.6 : (currentChannelIdx !== null ? 0.3 + (currentChannelIdx * 0.1) : 0.3);

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.alpha += p.fadeSpeed;
    if (p.alpha > 0.6) p.fadeSpeed = -Math.abs(p.fadeSpeed);
    if (p.alpha < 0.05) p.fadeSpeed = Math.abs(p.fadeSpeed);
    if (p.x < 0) p.x = bgCanvas.width;
    if (p.x > bgCanvas.width) p.x = 0;
    if (p.y < 0) p.y = bgCanvas.height;
    if (p.y > bgCanvas.height) p.y = 0;

    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(90, 138, 74, ${p.alpha * noiseLevel})`;
    bgCtx.fill();
  });

  requestAnimationFrame(animateParticles);
}
animateParticles();

<script>

  /* -- Lo-Fi Ambient Audio -- */
  (function() {
    var audioCtx = null;
    var masterGain = null;
    var droneOsc = null;
    var droneGain = null;
    var isPlaying = false;
    var noteTimer = null;
    var pentatonic = [130.81, 146.83, 164.81, 196, 220, 261.63, 293.66, 329.63, 392, 440];

    function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) { return; }
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.06;
      masterGain.connect(audioCtx.destination);

      droneOsc = audioCtx.createOscillator();
      droneOsc.type = 'sine';
      droneOsc.frequency.value = 55;
      droneGain = audioCtx.createGain();
      droneGain.gain.value = 0.12;
      droneOsc.connect(droneGain);
      droneGain.connect(masterGain);
      droneOsc.start();

      // Subtle harmonic drone
      var harmOsc = audioCtx.createOscillator();
      harmOsc.type = 'sine';
      harmOsc.frequency.value = 82.5;
      var harmGain = audioCtx.createGain();
      harmGain.gain.value = 0.05;
      harmOsc.connect(harmGain);
      harmGain.connect(masterGain);
      harmOsc.start();

      isPlaying = true;
      scheduleNote();
    }

    function scheduleNote() {
      if (!isPlaying) return;
      var delay = 3000 + Math.random() * 6000;
      noteTimer = setTimeout(function() {
        if (!isPlaying || !audioCtx) return;
        try {
          var freq = pentatonic[Math.floor(Math.random() * pentatonic.length)];
          var osc = audioCtx.createOscillator();
          osc.type = 'sine';
          osc.frequency.value = freq * 0.5;
          var g = audioCtx.createGain();
          g.gain.setValueAtTime(0, audioCtx.currentTime);
          g.gain.linearRampToValueAtTime(0.035, audioCtx.currentTime + 0.4);
          g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2.8);
          osc.connect(g);
          g.connect(masterGain);
          osc.start(audioCtx.currentTime);
          osc.stop(audioCtx.currentTime + 2.9);
        } catch(e) {}
        scheduleNote();
      }, delay);
    }

    function stopAudio() {
      isPlaying = false;
      clearTimeout(noteTimer);
      try {
        if (droneOsc) { droneOsc.stop(); droneOsc.disconnect(); droneOsc = null; }
      } catch(e) {}
      try {
        if (audioCtx && audioCtx.state !== 'closed') audioCtx.close();
      } catch(e) {}
      audioCtx = null;
    }

    var btn = document.createElement('button');
    btn.id = 'audio-toggle';
    btn.innerHTML = '&#9835;';
    btn.title = 'Ambient sound';
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      e.preventDefault();
      if (!audioCtx || audioCtx.state === 'closed') {
        initAudio();
        btn.classList.add('playing');
      } else if (isPlaying) {
        stopAudio();
        btn.classList.remove('playing');
        btn.style.opacity = '0';
      }
    });
    btn.addEventListener('mouseenter', function() { btn.style.opacity = '1'; });
    btn.addEventListener('mouseleave', function() {
      if (!isPlaying) btn.style.opacity = '0';
      else btn.style.opacity = '0.22';
    });
    document.body.appendChild(btn);

    // Auto-start on first user interaction
    var autoStarted = false;
    document.addEventListener('click', function autoStart() {
      if (autoStarted) return;
      autoStarted = true;
      initAudio();
      btn.classList.add('playing');
    }, {once: true});
    document.addEventListener('touchstart', function autoStart() {
      if (autoStarted) return;
      autoStarted = true;
      initAudio();
      btn.classList.add('playing');
    }, {once: true});
  })();


  /* -- Three.js 3D Particle Sphere -- */

    var group = new THREE.Group();

    // Surface dots on icosahedron
    var dotsGeo = new THREE.IcosahedronGeometry(1.8, 3);
    var dotsPositions = dotsGeo.attributes.position.array;
    var sampled = [];
    for (var i = 0; i < dotsPositions.length; i += 6) {
      sampled.push(dotsPositions[i], dotsPositions[i+1], dotsPositions[i+2]);
    }
    var ptsGeo = new THREE.BufferGeometry();
    ptsGeo.setAttribute('position', new THREE.Float32BufferAttribute(sampled, 3));
    var ptsMat = new THREE.PointsMaterial({ color: colorHex, size: 0.025, transparent: true, opacity: 0.22 });
    var surfacePts = new THREE.Points(ptsGeo, ptsMat);
    group.add(surfacePts);

    // Floating ambient particles around sphere
    var floatCount = 80;
    var floatPositions = new Float32Array(floatCount * 3);
    var floatData = [];
    for (var j = 0; j < floatCount; j++) {
      var theta = Math.random() * Math.PI * 2;
      var phi = Math.acos(2 * Math.random() - 1);
      var r = 1.8 + Math.random() * 1.2;
      floatPositions[j*3] = r * Math.sin(phi) * Math.cos(theta);
      floatPositions[j*3+1] = r * Math.sin(phi) * Math.sin(theta);
      floatPositions[j*3+2] = r * Math.cos(phi);
      floatData.push({
        baseX: floatPositions[j*3],
        baseY: floatPositions[j*3+1],
        baseZ: floatPositions[j*3+2],
        speed: 0.0005 + Math.random() * 0.002,
        phase: Math.random() * Math.PI * 2,
        amp: 0.1 + Math.random() * 0.3
      });
    }
    var floatGeo = new THREE.BufferGeometry();
    floatGeo.setAttribute('position', new THREE.Float32BufferAttribute(floatPositions, 3));
    var floatPts = new THREE.Points(
      floatGeo,
      new THREE.PointsMaterial({ color: colorHex, size: 0.018, transparent: true, opacity: 0.13 })
    );
    group.add(floatPts);

    // Second subtle ring
    var ringGeo = new THREE.TorusGeometry(2.1, 0.015, 16, 80);
    var ring = new THREE.Mesh(
      ringGeo,
      new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.06 })
    );
    ring.rotation.x = Math.PI / 3;
    group.add(ring);

    var time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.003;
      group.rotation.x += 0.0008;
      group.rotation.y += 0.0012;

      // Animate floating particles
      var posArray = floatPts.geometry.attributes.position.array;
      for (var k = 0; k < floatData.length; k++) {
        var fd = floatData[k];
        posArray[k*3] = fd.baseX + Math.sin(time * 3 + fd.phase) * fd.amp;
        posArray[k*3+1] = fd.baseY + Math.cos(time * 2.5 + fd.phase) * fd.amp;
        posArray[k*3+2] = fd.baseZ + Math.sin(time * 2 + fd.phase + 1) * fd.amp;
      }
      floatPts.geometry.attributes.position.needsUpdate = true;

      ring.rotation.z += 0.001;

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  })();


  /* -- 3D Card Tilt Effect -- */
  (function() {
    var cards = document.querySelectorAll('.project-card, .repo-card, .poem, .panel, .crt-frame, .msg, .log-entry');
    if (cards.length === 0) return;

    cards.forEach(function(card) {
      card.addEventListener('mouseenter', function() {
        card.style.transition = 'transform 0.1s ease-out, box-shadow 0.1s ease-out';
      });
      card.addEventListener('mousemove', function(e) {
        var rect = card.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        var cx = rect.width / 2;
        var cy = rect.height / 2;
        var rx = ((y - cy) / cy) * -5;
        var ry = ((x - cx) / cx) * 5;
        card.style.transform = 'perspective(600px) rotateX(' + rx + 'deg) rotateY(' + ry + 'deg) translateY(-2px)';
      });
      card.addEventListener('mouseleave', function() {
        card.style.transition = 'transform 0.5s cubic-bezier(0.33, 1, 0.68, 1), box-shadow 0.5s cubic-bezier(0.33, 1, 0.68, 1)';
        card.style.transform = 'perspective(600px) rotateX(0) rotateY(0) translateY(0)';
      });
    });
  })();

</script>
